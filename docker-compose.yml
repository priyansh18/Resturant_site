services:
  # Django DB Service (Python + SQLite) - Port 8000
  db-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./db_service:/app
      - sqlite_data:/app/data
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org --timeout 120 -r requirements.txt &&
             python manage.py makemigrations api &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/db/')"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # Spring Boot Backend (Java) - Port 8080
  backend:
    image: maven:3.9-eclipse-temurin-17
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    ports:
      - "8080:8080"
    command: >
      bash -c "
        echo | openssl s_client -connect repo.maven.apache.org:443 -servername repo.maven.apache.org 2>/dev/null | sed -ne '/-BEGIN CERTIFICATE-/,/-END CERTIFICATE-/p' > /tmp/proxy.crt &&
        keytool -importcert -trustcacerts -alias proxy-ca -file /tmp/proxy.crt -keystore $$JAVA_HOME/lib/security/cacerts -storepass changeit -noprompt 2>/dev/null;
        mvn spring-boot:run -Dspring-boot.run.arguments=--django.service.url=http://db-service:8000/db
      "
    depends_on:
      db-service:
        condition: service_healthy

  # React Frontend (Vite) - Port 5173
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  sqlite_data:
  maven_cache:
  node_modules:
